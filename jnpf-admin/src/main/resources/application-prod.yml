    stream:
      # 若使用RocketMQ-Start
      rocketmq:
        binder:
          name-server: 192.168.10.6:30094
          group: maxkey_identity
      # 若使用RocketMQ-End
      # 若使用RabbitMQ-Start
#      binders:
#        defaultRabbit: # 表示定义的名称，用于binding整合
