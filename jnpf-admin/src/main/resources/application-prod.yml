  # ===================== AI配置-Start =====================
    ai:
      openai:
        # 每个用户限制时间内的请求次数
        user-limit-count: 1
        # 每个用户限制时间频率
        user-limit-time: 3s
        # 全部请求限制时间内的请求次数
        total-limit-count: 500
        # 全部请求限制时间频率
        total-limit-time: 1m
